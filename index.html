const FIREBASE_URL = window.FIREBASE_DB_URL || "";
const sGet = async (k) => {
  if (!FIREBASE_URL) return null;
  try {
    const r = await fetch(FIREBASE_URL + "/avar_academy/" + k + ".json");
    if (!r.ok) return null;
    const data = await r.json();
    return data;
  } catch (e) { return null; }
};
const sSet = async (k, v) => {
  if (!FIREBASE_URL) return;
  try {
    await fetch(FIREBASE_URL + "/avar_academy/" + k + ".json", {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(v)
    });
  } catch (e) { console.error("Firebase error:", e); }
};
